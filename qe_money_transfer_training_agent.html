<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QE Training Agent</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;display:flex;justify-content:center;align-items:center;min-height:100vh}

.widget{width:400px;height:680px;background:#fff;border-radius:16px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,0.15)}

/* HEADER */
.header{background:linear-gradient(135deg,#1a73e8 0%,#1558b0 100%);padding:20px 18px 18px;flex-shrink:0}
.header-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.bot-avatar{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid rgba(255,255,255,0.4)}
.bot-avatar svg{width:26px;height:26px}
.bot-info{flex:1}
.bot-name{font-size:15px;font-weight:600;color:#fff}
.bot-status{font-size:11px;color:rgba(255,255,255,0.8);display:flex;align-items:center;gap:4px;margin-top:2px}
.status-dot{width:6px;height:6px;border-radius:50%;background:#4cef8a;display:inline-block}
.header-greeting{color:rgba(255,255,255,0.95);font-size:13px;line-height:1.5}

/* MODES */
.mode-bar{padding:10px 14px;border-bottom:1px solid #e8eaed;display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0;background:#fafafa}
.mode-btn{font-size:11px;padding:4px 10px;border-radius:14px;border:1px solid #dadce0;background:#fff;color:#5f6368;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.mode-btn.active{background:#e8f0fe;color:#1a73e8;border-color:#aecbfa;font-weight:500}
.mode-btn:hover:not(.active){background:#f1f3f4}

/* CHAT */
.chat{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:12px;background:#fff}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:#dadce0;border-radius:2px}

.msg{display:flex;align-items:flex-end;gap:8px}
.msg.user{flex-direction:row-reverse}

.bot-icon{width:28px;height:28px;border-radius:50%;background:#e8f0fe;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid #aecbfa}
.bot-icon svg{width:16px;height:16px}

.bubble{max-width:78%;padding:10px 13px;border-radius:16px;font-size:13px;line-height:1.6;word-break:break-word}
.msg.bot .bubble{background:#f1f3f4;color:#202124;border-radius:4px 16px 16px 16px}
.msg.user .bubble{background:#1a73e8;color:#fff;border-radius:16px 4px 16px 16px}
.msg.bot .bubble h3{font-size:13px;font-weight:600;margin:6px 0 2px;color:#1a73e8}
.msg.bot .bubble h4{font-size:12px;font-weight:600;margin:4px 0 2px;color:#3c4043}
.msg.bot .bubble p{margin:1px 0}
.msg.bot .bubble p:empty{display:none}
.msg.bot .bubble ul{margin:2px 0 2px 16px;padding:0}
.msg.bot .bubble li{margin:1px 0}
.msg.bot .bubble code{background:#e8eaed;border-radius:3px;padding:1px 4px;font-size:12px;font-family:monospace}
.msg.bot .bubble hr{border:none;border-top:1px solid #dadce0;margin:4px 0}
.msg.bot .bubble.has-table{max-width:100%}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:6px 0}
.msg.bot .bubble table{border-collapse:collapse;font-size:12px;width:100%}
.msg.bot .bubble th{background:#e8f0fe;color:#1a73e8;font-weight:600;padding:6px 10px;border:1px solid #c5d8fb;text-align:left;min-width:80px}
.msg.bot .bubble td{padding:5px 10px;border:1px solid #dadce0;vertical-align:top;white-space:normal;min-width:80px}
.msg.bot .bubble tr:nth-child(even) td{background:#f8f9fa}
/* TEST CASE CHECKLIST */
.tc-list{display:flex;flex-direction:column;gap:5px;margin:6px 0}
.tc-item{border:1px solid #dadce0;border-radius:8px;overflow:hidden;font-size:12px}
.tc-item summary{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;list-style:none;background:#fafafa;user-select:none}
.tc-item summary::-webkit-details-marker{display:none}
.tc-item[open]>summary{background:#e8f0fe;border-bottom:1px solid #c5d8fb}
.tc-item summary::after{content:'▶';font-size:9px;color:#80868b;margin-left:auto;transition:transform 0.2s;flex-shrink:0}
.tc-item[open]>summary::after{transform:rotate(90deg)}
.tc-checkbox{width:14px;height:14px;cursor:pointer;flex-shrink:0;accent-color:#1a73e8}
.tc-badge{font-size:10px;font-weight:700;background:#1a73e8;color:#fff;padding:2px 7px;border-radius:10px;flex-shrink:0;letter-spacing:.3px}
.tc-badge.pass{background:#1e8e3e}.tc-badge.fail{background:#d93025}
.tc-title{font-size:12px;color:#202124;font-weight:500;flex:1}
.tc-detail{padding:10px 12px;background:#fff;font-size:12px;color:#3c4043;line-height:1.7;border-top:1px solid #f1f3f4}
.tc-detail ul{list-style:disc;padding-left:16px;margin:2px 0}
.tc-detail ul li{list-style:disc;margin:1px 0}
.tc-detail .tc-row{margin-bottom:6px}
.tc-detail .tc-label{font-weight:600;color:#5f6368;font-size:11px;text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:2px}
.tc-section{font-size:11px;font-weight:600;color:#5f6368;padding:6px 2px 2px;letter-spacing:.3px}
/* FEATURE CARD */
.fc{border:1.5px solid #dadce0;border-radius:10px;overflow:hidden;font-size:12px;margin:2px 0}
.fc-title{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid #e8eaed;background:#fafafa}
.fc-title input[type=checkbox]{width:13px;height:13px;accent-color:#1a73e8;flex-shrink:0}
.fc-title span{font-size:11px;font-weight:700;color:#3c4043;letter-spacing:.5px;text-transform:uppercase}
.fc-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 12px;border-bottom:1px solid #f1f3f4;gap:8px}
.fc-row:last-child{border-bottom:none}
.fc-label{color:#5f6368;font-size:11.5px;white-space:nowrap;padding-top:1px}
.fc-val{text-align:right;font-weight:600;color:#202124;font-size:11.5px}
.fc-note{display:block;color:#d93025;font-weight:500;font-size:10.5px;margin-top:1px}
.fc-tags-row{padding:7px 12px;border-bottom:1px solid #f1f3f4}
.fc-tags-row:last-child{border-bottom:none}
.fc-tags-label{color:#5f6368;font-size:11.5px;margin-bottom:5px}
.fc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.fc-tag{font-size:11px;padding:3px 9px;border-radius:12px;background:#e8f0fe;color:#1a73e8;font-weight:500}
/* QUIZ */
.quiz-card{background:#fff;border:1.5px solid #dadce0;border-radius:12px;overflow:hidden;margin:2px 0;font-size:13px}
.quiz-hd{padding:7px 14px;background:#e8f0fe;border-bottom:1px solid #c5d8fb;font-size:11px;font-weight:600;color:#1a73e8;display:flex;justify-content:space-between}
.quiz-q{padding:12px 14px 10px;font-weight:500;color:#202124;line-height:1.5;font-size:12.5px}
.quiz-opts{display:flex;flex-direction:column;gap:5px;padding:0 14px 12px}
.quiz-opt{text-align:left;padding:8px 12px;border-radius:8px;border:1.5px solid #dadce0;background:#fff;font-size:12px;color:#3c4043;cursor:pointer;transition:all 0.15s;line-height:1.4}
.quiz-opt:hover:not([disabled]){background:#f8f9fa;border-color:#aecbfa}
.quiz-opt.correct{background:#e6f4ea!important;border-color:#34a853!important;color:#137333!important;font-weight:600}
.quiz-opt.wrong{background:#fce8e6!important;border-color:#ea4335!important;color:#c5221f!important}
.quiz-explain{margin:0 14px 10px;padding:8px 10px;background:#fafafa;border-left:3px solid #1a73e8;font-size:11.5px;color:#3c4043;border-radius:0 6px 6px 0;line-height:1.5}
.quiz-next{display:block;margin:0 14px 12px;padding:8px;background:#1a73e8;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;width:calc(100% - 28px);text-align:center}
.quiz-score-card{padding:20px 16px;text-align:center}
.quiz-score-num{font-size:36px;font-weight:700;color:#1a73e8;line-height:1}
.quiz-score-lbl{font-size:11px;color:#5f6368;margin-top:4px}
.quiz-score-msg{font-size:13px;font-weight:500;margin:12px 0 16px;color:#202124}
.quiz-score-btns{display:flex;gap:8px}
.quiz-score-btns button{flex:1;padding:9px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;border:1.5px solid #1a73e8}
.qsb-retry{background:#fff;color:#1a73e8}
.qsb-ai{background:#1a73e8;color:#fff}

.typing .bubble{background:#f1f3f4;padding:9px 13px;display:flex;align-items:center;gap:8px}
.typing-text{font-size:12px;color:#5f6368;animation:fadeStatus 0.3s ease}
.dots{display:flex;gap:4px;align-items:center;flex-shrink:0}
.dot{width:5px;height:5px;border-radius:50%;background:#9aa0a6;animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
@keyframes fadeStatus{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}

/* QUICK BTNS */
.quick-btns{padding:8px 14px 4px;display:flex;flex-wrap:wrap;gap:6px;background:#fff}
.qbtn{font-size:11.5px;padding:6px 12px;border-radius:16px;border:1px solid #dadce0;background:#fff;color:#1a73e8;cursor:pointer;transition:all 0.15s;font-weight:500}
.qbtn:hover{background:#e8f0fe;border-color:#aecbfa}

/* INPUT */
.input-row{display:flex;gap:8px;padding:10px 14px 12px;border-top:1px solid #e8eaed;flex-shrink:0;align-items:flex-end;background:#fff}
.input-row textarea{flex:1;resize:none;border:1.5px solid #dadce0;border-radius:20px;padding:9px 14px;font-size:13px;font-family:inherit;background:#fff;color:#202124;min-height:38px;max-height:90px;line-height:1.5;outline:none;transition:border-color 0.15s}
.input-row textarea:focus{border-color:#1a73e8}
.input-row textarea::placeholder{color:#80868b}
.send-btn{width:36px;height:36px;border-radius:50%;background:#1a73e8;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background 0.15s}
.send-btn:hover{background:#1558b0}
.send-btn:disabled{background:#dadce0;cursor:not-allowed}
.send-btn svg{width:16px;height:16px}
</style>
</head>
<body>

<div class="widget">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="bot-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="10" rx="2"/>
          <circle cx="12" cy="5" r="2"/>
          <line x1="12" y1="7" x2="12" y2="11"/>
          <circle cx="8.5" cy="15.5" r="1"/>
          <circle cx="15.5" cy="15.5" r="1"/>
          <line x1="9.5" y1="18.5" x2="14.5" y2="18.5"/>
        </svg>
      </div>
      <div class="bot-info">
        <div class="bot-name" id="botName">QE Training Agent</div>
        <div class="bot-status"><span class="status-dot"></span><span id="botStatusTxt">Online · Money Transfer</span></div>
      </div>
    </div>
    <div class="header-greeting" id="headerGreeting">Xin chào! Tôi hỗ trợ đào tạo QE về nghiệp vụ chuyển tiền, test case và mô phỏng tình huống thực tế.</div>
  </div>

  <!-- MODES -->
  <div class="mode-bar" id="modeBar">
    <button class="mode-btn active" onclick="setMode('all',this)" id="modeAll">Tất cả</button>
    <button class="mode-btn" onclick="setMode('nghiep_vu',this)" id="modeNV">Nghiệp vụ</button>
    <button class="mode-btn" onclick="setMode('test_case',this)" id="modeTC">Test case</button>
    <button class="mode-btn" onclick="setMode('quiz',this)" id="modeQuiz">🧠 Quiz</button>
  </div>

  <!-- CHAT -->
  <div class="chat" id="chat"></div>

  <!-- QUICK BUTTONS -->
  <div class="quick-btns" id="quickBtns"></div>

  <!-- INPUT -->
  <div class="input-row">
    <textarea id="userInput" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMsg()" aria-label="Send" disabled>
      <svg viewBox="0 0 24 24" fill="#fff"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
const AGENT_ENDPOINT = '/invocations';

const I18N = {
  vi: {
    placeholder: 'Nhập câu hỏi...',
    botStatusTxt: 'Online · Money Transfer',
    headerGreeting: 'Xin chào! Tôi hỗ trợ đào tạo QE về nghiệp vụ chuyển tiền, test case và mô phỏng tình huống thực tế.',
    modes: ['Tất cả','Nghiệp vụ','Test case','🧠 Quiz'],
    welcome: 'Xin chào! Tôi là **QE Training Agent**.\n\nTôi có thể giúp bạn:\n• **Nghiệp vụ** — P2P · iBFT · QR Code (hạn mức, KYC, phí, edge case)\n• **Test case** — sinh TC valid & invalid đầy đủ 5 trường\n• **Quiz** — trắc nghiệm + AI chấm điểm tình huống thực tế\n• **Feature cards** — tra nhanh thông số P2P · iBFT · QR Code',
    quick: {
      all:[['📋 P2P','__fc:p2p'],['📋 iBFT','__fc:ibft'],['📋 QR Code','__fc:qr'],['Nghiệp vụ P2P','Quy trình chuyển tiền P2P nội bộ là gì?']],
      nghiep_vu:[['Hạn mức','Hạn mức chuyển tiền và các quy định liên quan?'],['Trạng thái GD','Các trạng thái của một giao dịch chuyển tiền?'],['Rollback','Khi nào giao dịch bị rollback và quy trình hoàn tiền?']],
      test_case:[['Happy path','Viết test case happy path cho chuyển tiền nội địa'],['API test','Cấu trúc test case API cho endpoint chuyển tiền?']],
      quiz:[['🔁 Làm lại','__quiz:start'],['🎯 Hỏi AI','Tạo 1 câu hỏi scenario khó về nghiệp vụ transfer (P2P/iBFT/QR) để tôi luyện tập, sau đó đánh giá câu trả lời của tôi']]
    }
  },
};

const MODE_KEYS = ['all','nghiep_vu','test_case','quiz'];
const MODE_IDS  = ['modeAll','modeNV','modeTC','modeQuiz'];

let mode = 'all';
let history = [];
let isTyping = false;

function applyI18n() {
  const t = I18N.vi;
  document.getElementById('userInput').placeholder = t.placeholder;
  document.getElementById('botStatusTxt').textContent = t.botStatusTxt;
  document.getElementById('headerGreeting').textContent = t.headerGreeting;
  MODE_IDS.forEach((id, i) => { document.getElementById(id).textContent = t.modes[i]; });
  updateQuickBtns(mode);
}

function setMode(m, el) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  updateQuickBtns(m);
  if (m === 'quiz') startQuiz();
}

function updateQuickBtns(m) {
  const btns = I18N.vi.quick[m] || I18N.vi.quick.all;
  document.getElementById('quickBtns').innerHTML = btns.map(([label, q]) => {
    if (q.startsWith('__fc:')) return `<button class="qbtn" onclick="showFeatureCard('${q.slice(5)}')">${label}</button>`;
    if (q.startsWith('__quiz:')) return `<button class="qbtn" onclick="startQuiz()">${label}</button>`;
    return `<button class="qbtn" onclick="sendQuick('${q.replace(/'/g,"&#39;")}')">${label}</button>`;
  }).join('');
}

function renderLines(lines, esc, inline) {
  const out = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (/^#{1,4}\s/.test(line)) {
      const level = line.match(/^(#{1,4})/)[1].length;
      out.push(`<${level<=2?'h3':'h4'}>${inline(line.replace(/^#{1,4}\s+/,''))}</${level<=2?'h3':'h4'}>`);
      i++; continue;
    }
    if (/^\|/.test(line)) {
      const rows = [];
      while (i < lines.length && /^\|/.test(lines[i])) rows.push(lines[i++]);
      const isH = rows.length > 1 && /^[\|\s\-:]+$/.test(rows[1].replace(/[^|\-:\s]/g,''));
      let tbl = '<table>';
      rows.forEach((r,ri) => {
        if (ri===1 && isH) return;
        const cells = r.split('|').slice(1,-1).map(c=>c.trim());
        const tag = (ri===0 && isH) ? 'th' : 'td';
        tbl += '<tr>'+cells.map(c=>`<${tag}>${inline(c)}</${tag}>`).join('')+'</tr>';
      });
      out.push(`<div class="tbl-wrap">${tbl}</table></div>`); continue;
    }
    if (/^(-{3,}|\*{3,}|_{3,})$/.test(line.trim())) { out.push('<hr>'); i++; continue; }
    if (/^[-*]\s/.test(line)) {
      out.push('<ul>');
      while (i < lines.length && /^[-*]\s/.test(lines[i])) {
        const raw = lines[i++].replace(/^[-*]\s+/,'');
        const txt = raw.replace(/^\[[ xX]\]\s*/i, '');
        out.push(`<li>${inline(txt)}</li>`);
      }
      out.push('</ul>'); continue;
    }
    if (line.trim()==='') { i++; continue; }
    out.push(`<p>${inline(line)}</p>`); i++;
  }
  return out.join('');
}

function mdToHtml(text) {
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const inline = s => esc(s)
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`(.*?)`/g,'<code>$1</code>');

  // Strip code fences (```lang ... ```) — render content as markdown, not code
  text = text.replace(/^```[^\n]*\n([\s\S]*?)```/gm, (_, inner) => inner.trim());
  text = text.replace(/^```[^\n]*/gm, ''); // strip unclosed fences

  const lines = text.split('\n');
  const tcRe = /^(\*\*TC[\s\-]?\d+|\d+\.\s+\*\*TC[\s\-]?\d+|#{1,4}\s+TC[\s\-]?\d+)/i;
  const secRe = /^[✅❌⚠️🔴🟢]/u;

  // Pre-scan: if text has any TC lines → render entire response as TC accordion
  if (lines.some(l => tcRe.test(l))) {
    const blocks = [];
    let curSection = '';
    lines.forEach(l => {
      if (tcRe.test(l)) {
        blocks.push({ h: l, body: [], section: curSection });
      } else if (secRe.test(l.trim())) {
        curSection = l.trim();
      } else if (blocks.length) {
        blocks[blocks.length-1].body.push(l);
      }
      // lines before first TC (non-section) are silently skipped
    });
    if (blocks.length) {
      let html = '<div class="tc-list">';
      let lastSec = '';
      blocks.forEach(b => {
        if (b.section && b.section !== lastSec) {
          html += `<div class="tc-section">${esc(b.section)}</div>`;
          lastSec = b.section;
        }
        const raw = b.h.replace(/^#{1,4}\s+/,'').replace(/^\d+\.\s+/,'').replace(/^\*\*|\*\*$/g,'').trim();
        const m = raw.match(/^(TC[\s\-]?\d+)/i);
        const tcId = m ? m[1].replace(/\s/g,'').toUpperCase() : '';
        const title = raw.replace(/^TC[\s\-]?\d+[\s:\-]*/i,'').trim();
        let bodyHtml = '', inUl = false;
        b.body.filter(l=>l.trim()).forEach(l => {
          const s = l.replace(/^\s+/,'');
          if (/^(-{3,}|\*{3,}|_{3,})$/.test(s)) {
            if (inUl) { bodyHtml += '</ul>'; inUl = false; }
            bodyHtml += '<hr>';
          } else if (/^[-*•]\s/.test(s) || /^\d+[.)]\s/.test(s)) {
            if (!inUl) { bodyHtml += '<ul>'; inUl = true; }
            const raw2 = s.replace(/^[-*•]\s+|^\d+[.)]\s+/,'');
            bodyHtml += `<li>${inline(raw2.replace(/^\[[ xX]\]\s*/i,''))}</li>`;
          } else {
            if (inUl) { bodyHtml += '</ul>'; inUl = false; }
            if (s) bodyHtml += `<p>${inline(s)}</p>`;
          }
        });
        if (inUl) bodyHtml += '</ul>';
        html += `<details class="tc-item">
          <summary>
            <input type="checkbox" class="tc-checkbox" onclick="event.stopPropagation()">
            ${tcId?`<span class="tc-badge">${esc(tcId)}</span>`:''}
            <span class="tc-title">${inline(title)}</span>
          </summary>
          <div class="tc-detail">${bodyHtml||'<p>—</p>'}</div>
        </details>`;
      });
      html += '</div>';
      return html;
    }
  }

  const out = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    // heading
    if (/^#{1,4}\s/.test(line)) {
      const level = line.match(/^(#{1,4})/)[1].length;
      const tag = level <= 2 ? 'h3' : 'h4';
      out.push(`<${tag}>${inline(line.replace(/^#{1,4}\s+/,''))}</${tag}>`);
      i++; continue;
    }
    // table
    if (/^\|/.test(line)) {
      const rows = [];
      while (i < lines.length && /^\|/.test(lines[i])) rows.push(lines[i++]);
      const isH = rows.length > 1 && /^[\|\s\-:]+$/.test(rows[1].replace(/[^|\-:\s]/g,''));
      let tbl = '<table>';
      rows.forEach((r,ri) => {
        if (ri===1 && isH) return;
        const cells = r.split('|').slice(1,-1).map(c=>c.trim());
        const tag = (ri===0 && isH) ? 'th' : 'td';
        tbl += '<tr>'+cells.map(c=>`<${tag}>${inline(c)}</${tag}>`).join('')+'</tr>';
      });
      out.push(`<div class="tbl-wrap">${tbl}</table></div>`); continue;
    }
    // horizontal rule
    if (/^(-{3,}|\*{3,}|_{3,})$/.test(line.trim())) { out.push('<hr>'); i++; continue; }
    // unordered list
    if (/^[-*]\s/.test(line)) {
      out.push('<ul>');
      while (i < lines.length && /^[-*]\s/.test(lines[i])) {
        const raw = lines[i++].replace(/^[-*]\s+/,'');
        const txt = raw.replace(/^\[[ xX]\]\s*/i, '');
        out.push(`<li>${inline(txt)}</li>`);
      }
      out.push('</ul>'); continue;
    }
    // blank line — skip silently (no <br>, prevents large gaps)
    if (line.trim() === '') { i++; continue; }
    // paragraph
    out.push(`<p>${inline(line)}</p>`);
    i++;
  }
  return out.join('');
}

function appendMsg(role, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const html = role === 'bot' ? mdToHtml(text) :
    text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');

  if (role === 'bot') {
    const tableClass = html.includes('<table') ? ' has-table' : '';
    div.innerHTML = `
      <div class="bot-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="10" rx="2"/>
          <circle cx="12" cy="5" r="2"/>
          <line x1="12" y1="7" x2="12" y2="11"/>
          <circle cx="8.5" cy="15.5" r="1"/>
          <circle cx="15.5" cy="15.5" r="1"/>
        </svg>
      </div>
      <div class="bubble${tableClass}">${html}</div>`;
  } else {
    div.innerHTML = `<div class="bubble">${html}</div>`;
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

const TYPING_MSGS = ['Vũ trụ đang vận hành...', 'Thế giới đang xoay xoay...', 'Thời sắp đến...', 'Tiến lên...', 'Tiến lên...', 'Tới rồi...'];
let _typingTimer = null;

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg bot typing';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="bot-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="10" rx="2"/>
        <circle cx="12" cy="5" r="2"/>
        <line x1="12" y1="7" x2="12" y2="11"/>
      </svg>
    </div>
    <div class="bubble">
      <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      <span class="typing-text" id="typingText">${TYPING_MSGS[0]}</span>
    </div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  let idx = 0;
  _typingTimer = setInterval(() => {
    idx = (idx + 1) % TYPING_MSGS.length;
    const el = document.getElementById('typingText');
    if (el) {
      el.style.animation = 'none';
      el.offsetHeight;
      el.textContent = TYPING_MSGS[idx];
      el.style.animation = 'fadeStatus 0.3s ease';
    }
  }, 2000);
}

function removeTyping() {
  clearInterval(_typingTimer);
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

async function sendMsg() {
  const input = document.getElementById('userInput');
  const btn   = document.getElementById('sendBtn');
  const text  = input.value.trim();
  if (!text || isTyping) return;

  input.value = '';
  input.style.height = '';
  btn.disabled = true;
  isTyping = true;

  appendMsg('user', text);
  showTyping();

  try {
    const resp = await fetch(AGENT_ENDPOINT, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ message: text, mode, history: history.slice(-11) })
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const data = await resp.json();
    const reply = data.reply || 'Xin lỗi, có lỗi xảy ra.';
    history.push({role:'user', content: text});
    history.push({role:'assistant', content: reply});
    removeTyping();
    appendMsg('bot', reply);
  } catch (e) {
    removeTyping();
    appendMsg('bot', 'Xin lỗi, mất kết nối. Vui lòng thử lại.');
  }

  isTyping = false;
  btn.disabled = input.value.trim() === '';
  input.focus();
}

function sendQuick(q) {
  document.getElementById('userInput').value = q;
  document.getElementById('sendBtn').disabled = false;
  sendMsg();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function autoResize(el) {
  el.style.height = '';
  el.style.height = Math.min(el.scrollHeight, 90) + 'px';
  document.getElementById('sendBtn').disabled = el.value.trim() === '' || isTyping;
}

let _quizScore = 0;
let _quizAnswered = 0;

function startQuiz() {
  _quizScore = 0;
  _quizAnswered = 0;
  _renderQuizCard(0);
}

function _renderQuizCard(idx) {
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const q = QUIZ_QUESTIONS[idx];
  const total = QUIZ_QUESTIONS.length;
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg bot';
  const optsHtml = q.opts.map((o, i) =>
    `<button class="quiz-opt" onclick="_answerQuiz(${idx},${i})">${['A','B','C','D'][i]}. ${esc(o)}</button>`
  ).join('');
  div.innerHTML = `
    <div class="bot-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/>
      <line x1="12" y1="7" x2="12" y2="11"/><circle cx="8.5" cy="15.5" r="1"/><circle cx="15.5" cy="15.5" r="1"/>
    </svg></div>
    <div class="bubble"><div class="quiz-card" id="qcard-${idx}">
      <div class="quiz-hd"><span>Câu ${idx+1}/${total}</span><span id="qscore-${idx}">Đã làm: ${_quizAnswered} &nbsp;✅ ${_quizScore} &nbsp;❌ ${_quizAnswered-_quizScore}</span></div>
      <div class="quiz-q">${esc(q.q)}</div>
      <div class="quiz-opts" id="qopts-${idx}">${optsHtml}</div>
    </div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function _answerQuiz(idx, chosen) {
  const optsEl = document.getElementById(`qopts-${idx}`);
  if (!optsEl || optsEl.dataset.done) return;
  optsEl.dataset.done = '1';
  const q = QUIZ_QUESTIONS[idx];
  const btns = optsEl.querySelectorAll('.quiz-opt');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === q.correct) b.classList.add('correct');
    else if (i === chosen) b.classList.add('wrong');
  });
  if (chosen === q.correct) _quizScore++;
  _quizAnswered++;
  document.getElementById(`qscore-${idx}`).innerHTML = `Đã làm: ${_quizAnswered} &nbsp;✅ ${_quizScore} &nbsp;❌ ${_quizAnswered-_quizScore}`;
  const card = document.getElementById(`qcard-${idx}`);
  const ex = document.createElement('div');
  ex.className = 'quiz-explain';
  ex.textContent = (chosen === q.correct ? '✅ Đúng! ' : '❌ Sai. ') + q.explain;
  card.appendChild(ex);
  const nb = document.createElement('button');
  nb.className = 'quiz-next';
  const isLast = idx === QUIZ_QUESTIONS.length - 1;
  nb.textContent = isLast ? 'Xem kết quả →' : 'Câu tiếp theo →';
  nb.onclick = () => { nb.disabled = true; isLast ? _showQuizScore() : _renderQuizCard(idx + 1); };
  card.appendChild(nb);
  document.getElementById('chat').scrollTop = 99999;
}

function _showQuizScore() {
  const total = QUIZ_QUESTIONS.length;
  const pct = Math.round(_quizScore / total * 100);
  const msg = pct >= 80 ? '🎉 Xuất sắc! Bạn nắm rất vững nghiệp vụ Transfer.' :
               pct >= 60 ? '👍 Khá tốt! Ôn lại một vài điểm còn yếu nhé.' :
                           '📚 Cần ôn tập thêm — đọc lại PRD và thử lại!';
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `
    <div class="bot-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/>
      <line x1="12" y1="7" x2="12" y2="11"/><circle cx="8.5" cy="15.5" r="1"/><circle cx="15.5" cy="15.5" r="1"/>
    </svg></div>
    <div class="bubble"><div class="quiz-card"><div class="quiz-score-card">
      <div class="quiz-score-num">${_quizScore}/${total}</div>
      <div class="quiz-score-lbl">${pct}% chính xác</div>
      <div class="quiz-score-msg">${msg}</div>
      <div class="quiz-score-btns">
        <button class="qsb-retry" onclick="startQuiz()">🔁 Làm lại</button>
        <button class="qsb-ai" onclick="sendQuick('Tạo 1 câu hỏi scenario khó về nghiệp vụ transfer để tôi luyện tập, sau đó đánh giá câu trả lời của tôi')">🎯 Hỏi AI</button>
      </div>
    </div></div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function buildFeatureCardHtml(key) {
  const card = FEATURE_CARDS[key];
  if (!card) return '';
  let h = `<div class="fc">`;
  h += `<div class="fc-title"><input type="checkbox"><span>${card.title}</span></div>`;
  card.rows.forEach(r => {
    h += `<div class="fc-row"><span class="fc-label">${r.label}</span><span class="fc-val">${r.value}`;
    if (r.note) h += `<span class="fc-note">${r.note}</span>`;
    h += `</span></div>`;
  });
  card.tags.forEach(t => {
    h += `<div class="fc-tags-row"><div class="fc-tags-label">${t.label}</div><div class="fc-tags">`;
    t.chips.forEach(c => { h += `<span class="fc-tag">${c}</span>`; });
    h += `</div></div>`;
  });
  h += `</div>`;
  return h;
}
